services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: market_relayer_test
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "55432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d market_relayer_test"]
      interval: 2s
      timeout: 2s
      retries: 20
    tmpfs:
      - /var/lib/postgresql/data

  test-runner:
    build:
      context: .
      target: test-runner
    working_dir: /workspace
    environment:
      CGO_ENABLED: "0"
      GOTOOLCHAIN: local
      MARKET_RELAYER_TEST_POSTGRES_DSN: postgres://postgres:postgres@postgres:5432/market_relayer_test?sslmode=disable
    depends_on:
      postgres:
        condition: service_healthy
    command: ["/bin/sh", "/workspace/scripts/compose-run.sh", "test"]

  smoke-runner:
    build:
      context: .
      target: test-runner
    working_dir: /workspace
    environment:
      CGO_ENABLED: "0"
      GOTOOLCHAIN: local
      MARKET_RELAYER_TEST_POSTGRES_DSN: postgres://postgres:postgres@postgres:5432/market_relayer_test?sslmode=disable
    depends_on:
      postgres:
        condition: service_healthy
    command: ["/bin/sh", "/workspace/scripts/compose-run.sh", "smoke"]
