version: 1

service:
  name: market-relayer-go
  instance_id: local-dev

store:
  dsn: postgres://postgres:postgres@127.0.0.1:55432/market_relayer_test?sslmode=disable
  max_open_conns: 4
  min_open_conns: 0
  conn_max_lifetime: 30m
  connect_timeout: 5s
  lock_timeout: 5s
  lease_ttl: 15s
  lease_renew_interval: 5s

api:
  listen_addr: 127.0.0.1:8080
  shutdown_timeout: 5s

sink:
  kind: http
  url: http://127.0.0.1:18080/publish
  request_timeout: 500ms
  # bearer_token_env: MARKET_RELAYER_SINK_BEARER_TOKEN

sources:
  - name: coinbase-primary
    kind: coinbase
    product_id: ETH-USD
    request_timeout: 1s
    timestamp_mode: source_timestamp
  - name: kraken-secondary
    kind: kraken
    pair: ETH/USD
    request_timeout: 1s
    timestamp_mode: received_at
    max_unchanged_age: 10s
  - name: hyperliquid-eth
    kind: hyperliquid
    market: ETH
    request_timeout: 1s
    timestamp_mode: source_timestamp
  - name: pyth-wti
    kind: pyth
    asset_type: Commodities
    root_symbol: WTI
    quote_currency: USD
    curve_mode: nearby_linear_roll
    roll_window_days: 5
    max_confidence_bps: 250
    request_timeout: 1s
    timestamp_mode: source_timestamp
  - name: hyperliquid-wti
    kind: hyperliquid
    # Hyperliquid's WTI perp book is exposed via the xyz:CL market on l2Book.
    market: xyz:CL
    request_timeout: 1s
    timestamp_mode: source_timestamp

markets:
  - symbol: ETHUSD
    # session_mode config values are separate from runtime states such as
    # open, external_stale, and fallback_only.
    session_mode: always_open
    perp_book_source: hyperliquid-eth
    impact_notional_usd: "10000"
    publish_interval: 3s
    staleness_threshold: 10s
    max_fallback_age: 30s
    clamp_bps: 50
    divergence_threshold_bps: 250
    publish_scale: 2
    sources:
      - name: coinbase-primary
      - name: kraken-secondary
  - symbol: WTIUSD
    # Pyth Hermes metadata carries CME-style trading windows and holiday
    # overrides, so this market uses provider-driven scheduled sessions.
    session_mode: scheduled
    session_source: pyth-wti
    perp_book_source: hyperliquid-wti
    impact_notional_usd: "10000"
    publish_interval: 3s
    staleness_threshold: 15s
    max_fallback_age: 30s
    clamp_bps: 50
    divergence_threshold_bps: 250
    publish_scale: 2
    sources:
      - name: pyth-wti
